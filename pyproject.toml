[project]
name = "pyscaf-core-workspace"
version = "0.0.0"
requires-python = ">=3.12"
dependencies = []

[dependency-groups]
dev = [
    "pytest>=8",
    "ruff>=0.8",
    "python-semantic-release>=9.21.1",
    "mkdocs>=1.6",
    "mkdocs-material>=9.5",
    "mkdocstrings[python]>=0.27",
]

[build-system]
requires = ["hatchling>=1.26.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
# Minimal layout so hatchling can build an editable root; not a published product.
packages = ["src/pyscaf_core_workspace"]

[tool.uv.workspace]
members = ["packages/*", "apps/*"]

[tool.ruff]
line-length = 120
target-version = "py312"
extend-exclude = [
    "apps/pyscaf/src/pyscaf_app/actions/test/template_test_example.py",
]

[tool.ruff.lint]
select = ["E", "F", "I", "W"]

[tool.semantic_release]
version_toml = [
  "packages/pyscaf-core/pyproject.toml:project.version",
]
version_variables = ["packages/pyscaf-core/src/pyscaf_core/__init__.py:__version__"]
branch = "main"
upload_to_pypi = true
upload_to_release = true
upload_to_repository = true
assets = []
build_command_env = []
build_command = "pip install uv && cd packages/pyscaf-core && uv build --out-dir ../../dist"
commit_message = "{version}\n\nAutomatically generated by python-semantic-release"
changelog_sections = ["feature", "fix", "breaking"]
commit_parser = "conventional"

[tool.semantic_release.branches.main]
match = "(main|master)"
prerelease_token = "rc"
prerelease = false

[tool.semantic_release.changelog]
exclude_commit_patterns = []
mode = "init"
insertion_flag = "<!-- version list -->"

[tool.semantic_release.changelog.default_templates]
changelog_file = "CHANGELOG.md"
output_format = "md"
mask_initial_release = false

[tool.semantic_release.changelog.environment]
block_start_string = "{%"
block_end_string = "%}"
variable_start_string = "{{"
variable_end_string = "}}"
comment_start_string = "{#"
comment_end_string = "#}"
trim_blocks = false
lstrip_blocks = false
newline_sequence = "\n"
keep_trailing_newline = false
extensions = []
autoescape = false

[tool.semantic_release.commit_author]
env = "GIT_COMMIT_AUTHOR"
default = "semantic-release <semantic-release>"

[tool.semantic_release.commit_parser_options]
minor_tags = ["feat"]
patch_tags = ["fix", "perf"]
other_allowed_tags = ["build", "chore", "ci", "docs", "style", "refactor", "test"]
allowed_tags = ["feat", "fix", "perf", "build", "chore", "ci", "docs", "style", "refactor", "test"]
default_bump_level = 0
parse_squash_commits = true
ignore_merge_commits = false

[tool.semantic_release.remote]
name = "origin"
type = "github"
ignore_token_for_push = false
insecure = false

[tool.semantic_release.publish]
dist_glob_patterns = ["dist/*"]
upload_to_vcs_release = true

[tool.pytest.ini_options]
testpaths = [
    "packages/pyscaf-core/tests",
    "apps/demo-scaf/tests",
    "apps/pyscaf/tests",
    "apps/septeo-scaf/tests",
]
