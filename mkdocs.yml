site_name: pyscaf-core
site_description: A shared scaffolding engine for generating and evolving Python projects
site_url: https://id2l.github.io/pyscaf-core/
repo_url: https://github.com/ID2L/pyscaf-core
repo_name: ID2L/pyscaf-core

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [packages/pyscaf-core/src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            members_order: source
            merge_init_into_class: true
            show_if_no_docstring: false

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - Creating Actions: creating-actions.md
  - API Reference:
      - Overview: reference/index.md
      - actions: reference/actions.md
      - cli: reference/cli.md
      - preference_chain: reference/preference_chain.md
      - tools: reference/tools.md
      - testing: reference/testing.md
